    - ~/Library/Caches/com.microsoft.teams2/
    - ~/Library/Group Containers/UBF8T346G9.com.microsoft.teams/
  typical_size: 500 MB - 5 GB
  safety: caution
  importance: 3
  requires_app_closed: true
  what: >
    Microsoft Teams cache — meeting recordings cache, chat media,
    profile pictures, and runtime data. Paths differ between classic
    Teams and the newer "new Teams" (teams2) — layout may vary by version.
  delete_ok: >
    Close Teams first. Cache directories can typically be deleted but
    sign-in state will likely need refresh. Restrict manual deletion to
    obvious cache areas (Caches/ paths). Prefer Teams > Settings >
    Storage > Clear Cache where available.

- id: telegram_cache
  category: communication
