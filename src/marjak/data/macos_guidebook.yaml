  safety: safe
  importance: 4
  requires_app_closed: true
  what: >
    Spotify's offline song cache and streaming buffer. PersistentCache/
    contains downloaded tracks for offline listening. The Caches/ path
    has album art and UI assets.
  delete_ok: >
    Safe to delete. Spotify re-downloads tracks and re-buffers streams.
    Offline playlists will need to be re-downloaded. Close Spotify first.

- id: adobe_cache
  category: media
  entry_type: cache
  confidence: medium
  tags: [adobe, photoshop, premiere, creative, cache, media]
  paths:
    - ~/Library/Caches/Adobe/
    - ~/Library/Application Support/Adobe/
  typical_size: 2-20 GB
  safety: caution
  importance: 4
  requires_app_closed: true
  what: >
    Adobe Creative Cloud app data — media cache (Premiere Pro, After
    Effects), font cache, and scratch files. Application Support/Adobe/
    also contains license data, presets, and plug-in configs (mixed state).
  delete_ok: >
    ~/Library/Caches/Adobe/ is typically safe to delete. For Premiere/
    After Effects media cache, prefer the app's built-in "Delete" button
    in Preferences > Media Cache. Do NOT delete Application Support/Adobe/
    entirely — it contains license data and presets. Target only
    "Media Cache Files" and "Peak Files" subfolders within it.
  reclaimable:
