# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Mārjak macOS Filesystem Guidebook
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Compiled from Apple and vendor documentation where available,
# supplemented by commonly observed macOS application data layouts.
# Paths and internals may vary by app version and installation source.
# Size estimates are observed ranges — highly variable by workflow.
#
# Fields
# ------
#   id                  Unique identifier (snake_case).
#   category            system | browser | developer | package_manager |
#                       communication | media | apple_service.
#   entry_type          cache | temp | log | backup | installed_content |
#                       app_state | build_artifact.
#   confidence          high (official docs) | medium (vendor help /
#                       widely observed) | low (community / version-dependent).
#   tags                Keywords for query-time retrieval (lowercase).
#   paths               Filesystem globs (~ = user home).
#   typical_size        Observed range on real Macs; highly variable.
#   safety              safe | caution | dangerous
#   importance          1-5 (5 = most impactful to reclaim, 1 = tiny / risky).
#   requires_app_closed Whether the app should be quit before deletion.
#   what                One-line explanation of what the data IS.
#   delete_ok           Plain-English deletion guidance.
#   reclaimable         Subdirectory names typically safe to remove (optional).
#   preserve            Subdirectory names that must NOT be removed (optional).
#
# Sources
# -------
#   [A] Apple File System Programming Guide — Library Directory Details
#       developer.apple.com/library/archive/.../MacOSXDirectories.html
#   [D] Docker Desktop for Mac FAQ — docs.docker.com/desktop/mac/space
#   [X] Xcode Help — developer.apple.com/documentation/xcode
#   [H] Homebrew docs — docs.brew.sh
#   Unlabelled entries are based on observed macOS 14 Sonoma layouts
#   and community convention. Paths may differ across versions.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ─── SYSTEM ─────────────────────────────────────────────────────────────────

- id: user_caches
  category: system
  entry_type: cache
  confidence: high
  tags: [cache, caches, library, cleanup, disk, space, system]
  paths:
    - ~/Library/Caches/
  typical_size: 2-15 GB
  safety: safe
  importance: 5
  requires_app_closed: false
  what: >
    Per-application cache directories. Apple docs [A] state apps "should never
    rely on the existence of cache files" and "the system may delete the Caches/
    directory to free up disk space." Each subfolder is named by bundle ID.
  delete_ok: >
    Safe to delete individual app cache folders. Apps regenerate them on next
    launch. Deleting while an app is running may cause a brief hang. Target
    the largest subfolders rather than wiping the entire Caches/ directory.

- id: system_caches
  category: system
  entry_type: cache
  confidence: high
  tags: [cache, system, root, cleanup]
  paths:
    - /Library/Caches/
    - /System/Library/Caches/
  typical_size: 1-5 GB
  safety: caution
  importance: 3
  requires_app_closed: false
  what: >
    System-wide caches shared across all users. /System/Library/Caches/ is
    managed by macOS itself and protected by SIP. /Library/Caches/ holds
    caches for system daemons and apps installed for all users.
  delete_ok: >
    /Library/Caches/ subfolders can be cleared with sudo, but avoid touching
    /System/Library/Caches/ — SIP protects it and macOS manages it
    automatically. Clearing /Library/Caches/ may require re-login.

- id: system_logs
  category: system
  entry_type: log
  confidence: high
  tags: [log, logs, diagnostic, console, cleanup]
  paths:
    - ~/Library/Logs/
    - /Library/Logs/
    - /private/var/log/
  typical_size: 500 MB - 5 GB
  safety: safe
  importance: 3
  requires_app_closed: false
  what: >
    Application and system log files. Apple docs [A] describe ~/Library/Logs/
    as "log files for the console and specific system services." Includes
    crash logs, install logs, and app diagnostic output.
  delete_ok: >
    Safe to delete old log files. Apps and macOS recreate them as needed.
    Current logs (today's date) are actively written — prefer deleting logs
    older than 30 days.

- id: crash_reports
  category: system
  entry_type: log
  confidence: high
  tags: [crash, diagnostic, report, hang, panic]
  paths:
    - ~/Library/Logs/DiagnosticReports/
    - /Library/Logs/DiagnosticReports/
  typical_size: 100 MB - 2 GB
  safety: safe
  importance: 2
  requires_app_closed: false
  what: >
    Crash reports (.ips, .crash), hang reports, and spin dumps generated when
    apps or the system crash. Used by Feedback Assistant and third-party
    crash reporters.
  delete_ok: >
    Safe to delete. Only useful if actively debugging a crash. macOS
    generates new reports on future crashes.

- id: saved_app_state
  category: system
  entry_type: app_state
  confidence: high
  tags: [saved, state, resume, restore, app, window]
  paths:
    - ~/Library/Saved Application State/
  typical_size: 100 MB - 1 GB
  safety: safe
  importance: 2
  requires_app_closed: false
  what: >
    Window positions, scroll states, and unsaved document snapshots used by
    macOS Resume (re-open windows when relaunching an app). Each subfolder
    is named by bundle ID.
  delete_ok: >
    Safe to delete. Apps lose saved window state and open fresh on next
    launch. No data loss — this is UI state, not documents.

- id: temp_files
  category: system
  entry_type: temp
  confidence: high
  tags: [temp, temporary, tmp, cleanup]
  paths:
    - /private/var/folders/
    - /tmp/
  typical_size: 500 MB - 10 GB
  safety: caution
  importance: 4
  requires_app_closed: true
  what: >
    System and per-user temporary directories. /private/var/folders/ contains
    per-user temp caches organized by UID. /tmp/ is a symlink to /private/tmp/.
    Apple docs: "the system may purge this directory when your app is not
    running."
  delete_ok: >
    Contents can be deleted (not the directories themselves) but close all
    apps first — running apps may have open file handles in these dirs.
    The system recreates temp files as needed. Deleting while apps are
    active may cause crashes or data loss.

- id: spotlight_index
  category: system
  entry_type: cache
  confidence: high
  tags: [spotlight, index, search, mds, mdworker]
  paths:
    - /.Spotlight-V100/
    - /private/var/db/Spotlight-V100/
  typical_size: 2-10 GB
  safety: caution
  importance: 3
  requires_app_closed: false
  what: >
    Spotlight search index built by mds and mdworker daemons. Contains
    metadata indexes for every file on the volume. Regenerated automatically
    when deleted, but rebuild takes 30-60+ minutes with high CPU.
  delete_ok: >
    Only delete if Spotlight search is broken or returning wrong results.
    Use "sudo mdutil -E /" to properly trigger a re-index instead of
    manual deletion.

# ─── BROWSERS ───────────────────────────────────────────────────────────────
# Chromium-based browsers (Chrome, Brave, Edge, Arc) share a similar
# internal profile structure. Exact subfolder names may vary by version.
# The "Default/" profile is primary; "Profile N/" are additional profiles.

- id: chrome_cache
  category: browser
  entry_type: cache
  confidence: medium
  tags: [chrome, google, browser, cache, chromium, web]
  paths:
    - ~/Library/Application Support/Google/Chrome/
    - ~/Library/Caches/Google/Chrome/
  typical_size: 1-8 GB
  safety: caution
  importance: 4
  requires_app_closed: true
  what: >
    Google Chrome user data. Application Support holds profile folders
    (Default/, Profile N/) containing browsing data, bookmarks, and
    passwords. Caches/ holds the HTTP cache. Chromium commonly stores
    web cache, GPU shader cache, compiled JS, and service worker data
    inside each profile.
  delete_ok: >
    Cache subdirs inside each profile are typically regenerated on launch:
    Cache/, Code Cache/, GPUCache/, DawnGraphiteCache/, DawnWebGPUCache/.
    Service Worker/ and CacheStorage/ contain offline app data — deleting
    may break PWA offline features until re-synced. Close Chrome first.
  reclaimable:
    - Cache
    - Code Cache
    - GPUCache
    - DawnGraphiteCache
    - DawnWebGPUCache
    - GrShaderCache
  preserve:
    - Bookmarks
    - Login Data
    - Preferences
    - Cookies
    - Local State
    - History
    - Extensions

- id: brave_cache
  category: browser
  entry_type: cache
  confidence: medium
  tags: [brave, browser, cache, chromium, web]
  paths:
    - ~/Library/Application Support/BraveSoftware/Brave-Browser/
    - ~/Library/Caches/BraveSoftware/
  typical_size: 500 MB - 5 GB
  safety: caution
  importance: 4
  requires_app_closed: true
  what: >
    Brave Browser user data. Chromium-based — similar internal structure
    to Chrome. Commonly includes Brave-specific directories:
    component_crx_cache (extension updates), Crashpad (crash dumps).
  delete_ok: >
    Typically reclaimable subdirs: Cache/, Code Cache/, GPUCache/,
    GraphiteDawnCache/. Also commonly safe: component_crx_cache/
    (re-downloaded), Crashpad/. Close Brave first. Subfolder names
    may vary by Brave version.
  reclaimable:
    - Cache
    - Code Cache
    - GPUCache
    - GraphiteDawnCache
    - component_crx_cache
    - Crashpad
  preserve:
    - Bookmarks
    - Login Data
    - Preferences
    - Cookies
    - Local State
    - BraveWallet

- id: edge_cache
  category: browser
  entry_type: cache
  confidence: medium
  tags: [edge, microsoft, browser, cache, chromium, web]
  paths:
    - ~/Library/Application Support/Microsoft Edge/
    - ~/Library/Caches/com.microsoft.edgemac/
  typical_size: 500 MB - 5 GB
  safety: caution
  importance: 4
  requires_app_closed: true
  what: >
    Microsoft Edge user data. Chromium-based — similar internal structure
    to Chrome/Brave. May include Edge-specific sync directories.
  delete_ok: >
    Same typical reclaimable subdirs as Chrome. Close Edge first.
  reclaimable:
    - Cache
    - Code Cache
    - GPUCache
  preserve:
    - Bookmarks
    - Login Data
    - Preferences
    - Cookies

- id: arc_cache
  category: browser
  entry_type: cache
  confidence: low
  tags: [arc, browser, cache, chromium, web]
  paths:
    - ~/Library/Application Support/Arc/
    - ~/Library/Caches/company.thebrowser.Browser/
  typical_size: 500 MB - 5 GB
  safety: caution
  importance: 4
  requires_app_closed: true
  what: >
    Arc Browser user data. Chromium-based — similar internal structure.
    Arc may store profile data under StorageV2/ with per-profile
    subdirectories. Layout may change between Arc versions.
  delete_ok: >
    Same typical reclaimable cache subdirs as Chrome. Close Arc first.
    Arc's internal layout is less stable than Chrome's — verify before
    bulk-deleting.
  reclaimable:
    - Cache
    - Code Cache
    - GPUCache
  preserve:
    - Bookmarks
    - Login Data
    - Preferences
    - StorageV2

- id: safari_cache
  category: browser
  entry_type: cache
  confidence: high
  tags: [safari, apple, browser, cache, web, webkit]
  paths:
    - ~/Library/Caches/com.apple.Safari/
    - ~/Library/Safari/
    - ~/Library/Containers/com.apple.Safari/Data/Library/Caches/
  typical_size: 500 MB - 3 GB
  safety: caution
  importance: 3
  requires_app_closed: true
  what: >
    Safari browser data. Caches/ holds web cache and page previews.
    ~/Library/Safari/ holds bookmarks, history, reading list, and
    extension state. The Containers path is used on sandboxed Safari.
  delete_ok: >
    ~/Library/Caches/com.apple.Safari/ is safe to delete (web cache).
    Do NOT delete ~/Library/Safari/Bookmarks.plist or ReadingListArchives/.
    Prefer Safari > Settings > Privacy > Manage Website Data for safe
    built-in cleanup.
  reclaimable:
    - Webpage Previews
    - Cache.db
    - fsCachedData
  preserve:
    - Bookmarks.plist
    - ReadingListArchives
    - Extensions

- id: firefox_cache
  category: browser
  entry_type: cache
  confidence: medium
  tags: [firefox, mozilla, browser, cache, web, gecko]
  paths:
    - ~/Library/Application Support/Firefox/Profiles/
    - ~/Library/Caches/Firefox/Profiles/
  typical_size: 500 MB - 3 GB
  safety: caution
  importance: 3
  requires_app_closed: true
  what: >
    Firefox profile data. Each profile has a random-named folder. Inside:
    cache2/ (HTTP cache), datareporting/ (telemetry), storage/ (IndexedDB,
    localStorage — not just cache, may contain meaningful site data).
  delete_ok: >
    cache2/ and datareporting/ are typically safe to delete. Close Firefox
    first. storage/default/ contains site-specific data (IndexedDB,
    localStorage) that may include app state — delete only if you accept
    losing offline PWA data and site preferences. Do NOT delete key4.db,
    places.sqlite, or logins.json.
  reclaimable:
    - cache2
    - datareporting
    - crashes
  preserve:
    - key4.db
    - places.sqlite
    - logins.json
    - cert9.db
    - extensions

# ─── DEVELOPER TOOLS ────────────────────────────────────────────────────────

- id: xcode_derived_data
  category: developer
  entry_type: build_artifact
  confidence: high
  tags: [xcode, derived, data, build, compile, developer, swift, ios]
  paths:
    - ~/Library/Developer/Xcode/DerivedData/
  typical_size: 10-50 GB
  safety: safe
  importance: 5
  requires_app_closed: false
  what: >
    Xcode build artifacts — intermediate object files, compiled modules,
    indexes, and build logs. Each project/workspace gets its own subfolder.
    Often the single largest space hog for iOS/macOS developers. [X]
  delete_ok: >
    Completely safe to delete. Xcode recreates everything on next build.
    Delete the entire DerivedData/ folder or individual project subfolders.
    Next build will be slower (clean build) but functionally identical.

- id: xcode_archives
  category: developer
  entry_type: build_artifact
  confidence: high
  tags: [xcode, archive, ipa, release, developer]
  paths:
    - ~/Library/Developer/Xcode/Archives/
  typical_size: 1-20 GB
  safety: caution
  importance: 4
  requires_app_closed: false
  what: >
    App archives created via Product > Archive in Xcode. Contains
    .xcarchive bundles used for App Store submission, ad-hoc distribution,
    and dSYM files for crash symbolication.
  delete_ok: >
    Safe to delete old archives no longer needed for submission or crash
    debugging. Keep archives for any app version currently in the App Store
    if you need to symbolicate crash reports. Check Xcode Organizer first.

- id: xcode_device_support
  category: developer
  entry_type: cache
  confidence: high
  tags: [xcode, device, support, ios, iphone, symbols, developer]
  paths:
    - ~/Library/Developer/Xcode/iOS DeviceSupport/
    - ~/Library/Developer/Xcode/watchOS DeviceSupport/
  typical_size: 2-5 GB per iOS version
  safety: safe
  importance: 4
  requires_app_closed: false
  what: >
    Debug symbol caches for each iOS/watchOS version you have connected
    a physical device running. Named by version (e.g. "17.4 (21E219)").
    Needed for on-device debugging.
  delete_ok: >
    Safe to delete older versions. Xcode re-downloads symbols when you
    next connect a device running that OS version. Keep only the versions
    matching your current test devices.

- id: xcode_simulators
  category: developer
  entry_type: installed_content
  confidence: high
  tags: [xcode, simulator, ios, iphone, coresimulator, developer]
  paths:
    - ~/Library/Developer/CoreSimulator/
  typical_size: 5-40 GB
  safety: caution
  importance: 5
  requires_app_closed: true
  what: >
    iOS/watchOS/tvOS Simulator runtimes and data. Contains downloaded
    simulator runtime images (2-6 GB each) and per-simulator app data.
    Managed by simctl.
  delete_ok: >
    Use "xcrun simctl delete unavailable" to prune simulators for removed
    runtimes. Individual simulator data can be deleted via Xcode > Settings >
    Platforms. Deleting runtime images requires re-download (6+ GB each).
    Prefer Xcode's built-in management over manual deletion.

- id: xcode_caches
  category: developer
  entry_type: cache
  confidence: high
  tags: [xcode, cache, developer]
  paths:
    - ~/Library/Caches/com.apple.dt.Xcode/
  typical_size: 1-5 GB
  safety: safe
  importance: 3
  requires_app_closed: false
  what: >
    Xcode's own cache directory — documentation downloads, asset catalog
    compiled caches, and SourceKit indexes.
  delete_ok: >
    Safe to delete. Xcode regenerates on next launch. May cause a brief
    re-indexing delay.

- id: docker_desktop
  category: developer
  entry_type: app_state
  confidence: high
  tags: [docker, container, image, vm, developer, devops]
  paths:
    - ~/Library/Containers/com.docker.docker/Data/vms/
    - ~/Library/Group Containers/group.com.docker/
  typical_size: 10-100 GB
  safety: dangerous
  importance: 5
  requires_app_closed: true
  what: >
    Docker Desktop stores all containers, images, and volumes inside a
    single VM disk image (Docker.raw or Docker.qcow2). The file grows
    large but only shrinks when images/containers are explicitly removed. [D]
  delete_ok: >
    Do NOT delete Docker.raw directly — that destroys all containers and
    images. Use "docker system prune" to remove unused images, containers,
    and build cache. To reclaim space after pruning: Docker Desktop >
    Settings > Resources > Disk image size.

- id: homebrew_download_cache
  category: developer
  entry_type: cache
  confidence: high
  tags: [homebrew, brew, cache, formula, developer]
  paths:
    - ~/Library/Caches/Homebrew/
  typical_size: 1-10 GB
  safety: safe
  importance: 4
  requires_app_closed: false
  what: >
    Downloaded formula tarballs, bottle binaries, and cask .dmg/.pkg files.
    Homebrew keeps these to speed up reinstalls. [H]
  delete_ok: >
    Safe to delete. Use "brew cleanup" for Homebrew's built-in cleanup
    (removes outdated downloads). Or delete ~/Library/Caches/Homebrew/
    directly. Homebrew re-downloads on next install.

- id: homebrew_caskroom
  category: developer
  entry_type: installed_content
  confidence: high
  tags: [homebrew, brew, cask, caskroom, app, installed]
  paths:
    - /opt/homebrew/Caskroom/
  typical_size: 500 MB - 5 GB
  safety: caution
  importance: 3
  requires_app_closed: false
  what: >
    Installed Homebrew cask versions (GUI apps). Contains staged .app
    bundles and versioned install receipts. Not cache — this is installed
    software state.
  delete_ok: >
    Do NOT delete manually. Use "brew uninstall --cask <name>" to properly
    remove cask apps. Deleting directly may leave orphaned Applications
    entries and broken brew tracking.

# ─── PACKAGE MANAGERS ───────────────────────────────────────────────────────

- id: npm_cache
  category: package_manager
  entry_type: cache
  confidence: high
  tags: [npm, node, javascript, cache, package]
  paths:
    - ~/.npm/_cacache/
  typical_size: 500 MB - 5 GB
  safety: safe
  importance: 3
  requires_app_closed: false
  what: >
    npm's content-addressable download cache. Stores tarballs of every
    package version ever installed. Speeds up reinstalls.
  delete_ok: >
    Safe to delete. Use "npm cache clean --force". npm re-downloads
    packages on next install.

- id: yarn_cache
  category: package_manager
  entry_type: cache
  confidence: high
  tags: [yarn, javascript, cache, package]
  paths:
    - ~/Library/Caches/Yarn/
    - ~/.yarn/berry/cache/
  typical_size: 500 MB - 3 GB
  safety: safe
  importance: 3
  requires_app_closed: false
  what: >
    Yarn package cache. v1 uses ~/Library/Caches/Yarn/, v2+ (Berry) uses
    ~/.yarn/berry/cache/. Stores downloaded package tarballs.
  delete_ok: >
    Safe to delete. Use "yarn cache clean". Yarn re-downloads on next
    install.

- id: pip_cache
  category: package_manager
  entry_type: cache
  confidence: high
  tags: [pip, python, cache, package, wheel]
  paths:
    - ~/Library/Caches/pip/
  typical_size: 200 MB - 2 GB
  safety: safe
  importance: 2
  requires_app_closed: false
  what: >
    pip's HTTP and wheel cache. Stores downloaded .whl and .tar.gz files
    to avoid re-downloading packages.
  delete_ok: >
    Safe to delete. Use "pip cache purge". pip re-downloads on next
    install.

- id: cocoapods_cache
  category: package_manager
  entry_type: cache
  confidence: high
  tags: [cocoapods, pods, ios, swift, xcode, cache]
  paths:
    - ~/Library/Caches/CocoaPods/
    - ~/.cocoapods/repos/
  typical_size: 1-5 GB
  safety: safe
  importance: 3
  requires_app_closed: false
  what: >
    CocoaPods spec repo clone (~/.cocoapods/repos/trunk/) and downloaded
    pod source cache. The spec repo alone is 1-3 GB.
  delete_ok: >
    Safe to delete. "pod cache clean --all" clears download cache.
    Deleting ~/.cocoapods/repos/ forces a re-clone on next "pod install"
    (slow but harmless).

- id: cargo_cache
  category: package_manager
  entry_type: cache
  confidence: high
  tags: [cargo, rust, cache, crate, package]
  paths:
    - ~/.cargo/registry/
    - ~/.cargo/git/
  typical_size: 500 MB - 5 GB
  safety: safe
  importance: 3
  requires_app_closed: false
  what: >
    Rust crate registry index, downloaded crate sources, and git
    checkouts for git-based dependencies.
  delete_ok: >
    Safe to delete. Cargo re-downloads on next build. Use "cargo cache"
    (cargo-cache tool) for selective cleanup, or delete registry/cache/
    and git/checkouts/ directly.

- id: gradle_cache
  category: package_manager
  entry_type: cache
  confidence: high
  tags: [gradle, java, android, build, cache]
  paths:
    - ~/.gradle/caches/
    - ~/.gradle/wrapper/dists/
  typical_size: 1-10 GB
  safety: safe
  importance: 3
  requires_app_closed: false
  what: >
    Gradle build cache, dependency artifacts, and wrapper distribution
    archives. Used by Android Studio and any Gradle-based Java/Kotlin
    project.
  delete_ok: >
    Safe to delete. Gradle re-downloads dependencies and wrapper versions
    on next build. Next build will be slower (cold cache).

