- id: steam_library
  category: media
  entry_type: installed_content
  confidence: medium
  tags: [steam, game, gaming, download]
  paths:
    - ~/Library/Application Support/Steam/steamapps/
  typical_size: 10-200 GB
  safety: caution
  importance: 5
  requires_app_closed: true
  what: >
    Steam game install directory — primarily installed content, not cache.
    Each game is in steamapps/common/. steamapps/downloading/ has partial
    downloads. steamapps/shadercache/ has precompiled shaders.
  delete_ok: >
    Use Steam's built-in uninstall to remove games (preserves save files).
    steamapps/shadercache/ can be deleted (Steam rebuilds it).
    steamapps/downloading/ can be deleted to clear stuck downloads.
    Do NOT manually delete steamapps/common/GameName/ without uninstalling
    first — Steam loses track of the game.
  reclaimable:
    - shadercache
    - downloading
    - temp
  preserve:
    - common
    - appmanifest_*.acf

# ─── APPLE SERVICES ─────────────────────────────────────────────────────────

- id: ios_backups
  category: apple_service
  entry_type: backup
  confidence: high
  tags: [backup, iphone, ipad, ios, mobile, itunes, finder, apple]
  paths:
    - ~/Library/Application Support/MobileSync/Backup/
  typical_size: 10-100+ GB
  safety: dangerous
  importance: 5
  requires_app_closed: false
  what: >
    Local iPhone/iPad backups created by Finder (or iTunes on older macOS).
    Each backup is a folder named by device UUID. Contains app data,
    photos, messages, health data — essentially a full device snapshot.
    Can be encrypted. This is valuable user data, not cleanup junk.
  delete_ok: >
    Delete old backups for devices you no longer own. Use Finder > General >
    Manage Backups to see which devices and dates are stored. Ensure you
    have a confirmed working iCloud backup before deleting local ones.
    Do NOT delete backups for your current device unless iCloud backup
    is verified.

